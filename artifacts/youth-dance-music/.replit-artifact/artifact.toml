kind = "web"
previewPath = "/"
title = "Youth Dance Music"
version = "1.0.0"
id = "artifacts/youth-dance-music"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18809

[services.development]
run = "pnpm --filter @workspace/youth-dance-music run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/youth-dance-music", "run", "build" ]
publicDir = "artifacts/youth-dance-music/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18809"
BASE_PATH = "/"
