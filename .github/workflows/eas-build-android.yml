name: EAS Build — Android APK

on:
  push:
    branches:
      - main
      - Youthdancemusicapp
    paths:
      - 'artifacts/youth-dance-music-mobile/**'
      - '.github/workflows/eas-build-android.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK (preview)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Link EAS project
        working-directory: artifacts/youth-dance-music-mobile
        run: eas init --id 6a9dd245-610e-4999-8098-58289c4261b4 --non-interactive

      - name: Build Android APK
        working-directory: artifacts/youth-dance-music-mobile
        run: eas build --platform android --profile preview --non-interactive
